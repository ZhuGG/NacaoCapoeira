<!doctype html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Galerie et temps forts : baptêmes, rodas, stages et événements."><meta property="og:title" content="Galerie"><meta property="og:description" content="Galerie photo de la section Nação Capoeira.">
<link rel="stylesheet" href="public/assets/styles.css"><script src="public/assets/app.js"></script></head>
<body><header id="site-nav" class="topbar"></header><main class="section"><div class="container">
<span class="eyebrow">Galerie / Temps forts</span><h1>Rodas, baptêmes, stages, démonstrations</h1>
<p class="lead">Aperçu des moments de pratique et de transmission de la section.</p>
<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(240px,1fr));" id="galleryGrid"></div>
</div></main><div id="float-cta" class="float-cta"></div><footer id="site-footer" class="footer"></footer>
<script>
site.loadConfig().then(c=>{
  site.setMeta(c,'Galerie','Temps forts de la section Nação Capoeira.');
  site.renderShell(c);
  site.injectStructuredData(c);

  const assets = c.galleryAssets?.length ? c.galleryAssets : ['public/assets/images/gallery-01.jpg'];
  const captions = ['Baptême & passage de cordes','Stage musique','Démonstration publique'];
  const html = [0,1,2].map((i)=>{
    const src = assets[i] || assets[0];
    return `<figure class="card reveal"><img class="gallery-image" src="${src}" alt="${captions[i]}" loading="lazy"><figcaption class="small">${captions[i]}</figcaption></figure>`;
  }).join('');
  document.getElementById('galleryGrid').innerHTML = html;
  site.initRevealAnimations();
});
</script></body></html>
