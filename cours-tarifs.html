<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Horaires, tarifs, FAQ et inscriptions capoeira à Oullins / Pierre-Bénite.">
<meta property="og:title" content="Cours & Tarifs">
<meta property="og:description" content="Saison en cours : horaires et tarifs de la section Nação Capoeira.">
<link rel="stylesheet" href="public/assets/styles.css">
<script src="public/assets/app.js"></script>
</head>
<body>
<header id="site-nav" class="topbar"></header>
<main class="section">
  <div class="container">
    <span class="eyebrow">Cours & Tarifs</span>
    <h1>Pratiquer selon votre rythme</h1>
    <p class="lead">Cours enfants, ados et adultes, progression claire et cadre collectif exigeant.</p>

    <div class="card reveal">
      <p class="kicker" id="season"></p>
      <table id="schedule" class="table"></table>
    </div>

    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(240px,1fr));margin-top:1rem" id="prices"></div>

    <div class="card reveal" style="margin-top:1rem">
      <h2>FAQ pratique</h2>
      <div id="faq"></div>
    </div>
  </div>
</main>
<div id="float-cta" class="float-cta"></div>
<footer id="site-footer" class="footer"></footer>
<script>
site.loadConfig().then(config => {
  site.setMeta(config, 'Cours & Tarifs', 'Horaires et tarifs de la section Nação Capoeira Oullins.');
  site.renderShell(config);
  site.injectStructuredData(config);
  site.initRevealAnimations();

  document.getElementById('season').textContent = config.seasonLabel;
  document.getElementById('schedule').innerHTML = '<tr><th>Public</th><th>Niveau</th><th>Jour</th><th>Horaire</th><th>Lieu</th></tr>' +
    config.schedules.map(s => `<tr><td>${s.audience}</td><td>${s.level}</td><td>${s.day}</td><td>${s.time}</td><td>${s.location}</td></tr>`).join('');
  document.getElementById('prices').innerHTML = config.prices.map(p => `<article class="card interactive reveal"><h3>${p.label}</h3><p style="font-size:2rem;margin:0">${p.price}</p></article>`).join('') +
    `<article class="card reveal"><h3>Licence / adhésion</h3><ul>${config.fees.map(f => `<li>${f}</li>`).join('')}</ul></article>`;
  document.getElementById('faq').innerHTML = config.faq.map(x => `<details><summary>${x.q}</summary><p>${x.a}</p></details>`).join('');
});
</script>
</body>
</html>
